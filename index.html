<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
  </head>
  <body>
    <div class="flex justify-around items-center min-h-screen">
      <img src="./img/image 1.png" alt="" class="max-w-md" />
      <div class="w-full max-w-md bg-white p-8 rounded shadow">
        <img
          src="./img/Logo.png"
          alt=""
          class="mx-auto mb-4"
          style="height: 60px"
        />
        <div id="registerForm" style="display: none">
          <h2 class="text-xl font-bold mb-2 text-center">
            Join FinSight Today
          </h2>
          <label for="regName">Name</label>
          <input
            type="text"
            id="regName"
            class="border-2 border-gray-300 rounded-md p-2 w-full mb-2"
          />
          <label for="regEmail">Email Address</label>
          <input
            type="email"
            id="regEmail"
            class="border-2 border-gray-300 rounded-md p-2 w-full mb-2"
          />
          <label for="regPassword">Password</label>
          <div class="relative mb-2">
            <input
              type="password"
              id="regPassword"
              class="border-2 border-gray-300 rounded-md p-2 w-full pr-10"
            />
            <span
              class="absolute right-3 top-3 cursor-pointer"
              id="toggleRegPassword"
              >😑</span
            >
          </div>
          <label for="regConfirm">Confirm Password</label>
          <div class="relative mb-2">
            <input
              type="password"
              id="regConfirm"
              class="border-2 border-gray-300 rounded-md p-2 w-full pr-10"
            />
            <span
              class="absolute right-3 top-3 cursor-pointer"
              id="toggleRegConfirm"
              >😑</span
            >
          </div>
          <button
            id="registerBtn"
            type="button"
            class="bg-blue-600 text-white w-full py-2 rounded mb-2"
          >
            CREATE ACCOUNT
          </button>
          <p class="text-center text-sm">
            Already have an account?
            <a href="#" id="showLogin" class="text-blue-600">Login</a>
          </p>
          <p id="regError" class="text-red-500 text-sm mt-2"></p>
        </div>
        <div id="loginForm">
          <h2 class="text-xl font-bold mb-2 text-center">
            Welcome back to FinSight
          </h2>
          <label for="loginEmail">Email Address</label>
          <input
            type="email"
            id="loginEmail"
            class="border-2 border-gray-300 rounded-md p-2 w-full mb-2"
          />
          <label for="loginPassword">Password</label>
          <div class="relative mb-2">
            <input
              type="password"
              id="loginPassword"
              class="border-2 border-gray-300 rounded-md p-2 w-full pr-10"
            />
            <span
              class="absolute right-3 top-3 cursor-pointer"
              id="toggleLoginPassword"
              >😑</span
            >
          </div>
          <button
            id="loginBtn"
            type="button"
            class="bg-blue-600 text-white w-full py-2 rounded mb-2"
          >
            LOGIN
          </button>
          <p class="text-center text-sm">
            New to FinSight?
            <a href="#" id="showRegister" class="text-blue-600">Signup</a>
          </p>
          <p id="loginError" class="text-red-500 text-sm mt-2"></p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
